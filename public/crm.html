<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRM · Мебельные заявки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#f4f6f9;--surface:#fff;--ink:#212529;--muted:#6c757d;--line:#dee2e6;--accent:#315c78;--accent-soft:#e7eef3;--warm:#a06b2c;--bad:#9b3a34;--radius:6px }
    *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);background:var(--bg);font-family:"Golos Text","Segoe UI",sans-serif}
    button,input,select{min-height:38px;border:1px solid var(--line);border-radius:6px;padding:8px 10px;font:inherit;color:var(--ink);background:var(--surface)}
    button{border-color:var(--accent);background:var(--accent);color:#fff;font-weight:700;cursor:pointer}button.secondary{color:var(--accent);background:var(--surface)}button:disabled{opacity:.55;cursor:wait}
    .topbar{position:sticky;top:0;z-index:5;padding:14px 18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.96)}
    .topbar-inner{display:flex;gap:16px;align-items:center;justify-content:space-between;max-width:1800px;margin:auto}.brand{display:flex;gap:12px;align-items:center}
    .brand-mark{display:grid;width:38px;aspect-ratio:1;place-items:center;border-radius:var(--radius);color:#fff;background:var(--accent);font-weight:800}
    h1{margin:0;font-size:20px;letter-spacing:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .controls input[type=search]{width:min(280px,42vw)}.controls input[type=password]{width:150px}.admin-link{color:var(--accent);font-weight:700;text-decoration:none}
    .filters{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 14px}.filters button{min-height:32px;padding:5px 9px;border-color:var(--line);color:var(--muted);background:var(--surface);font-size:12px}.filters button.active{border-color:var(--accent);color:#fff;background:var(--accent)}
    main{max-width:1800px;margin:auto;padding:18px}.status-line{min-height:22px;color:var(--muted);font-size:13px}.status-line.ok{color:var(--accent)}.status-line.bad{color:var(--bad)}
    .summary{display:grid;grid-template-columns:repeat(6,minmax(130px,1fr));gap:8px;margin:8px 0 18px}.summary div{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface)}
    .summary span{color:var(--muted);font-size:12px}.summary strong{font-size:17px}.board{display:grid;grid-template-columns:repeat(6,minmax(245px,1fr));gap:10px;align-items:start;overflow-x:auto;padding-bottom:18px}
    .lane{min-width:245px;border-top:3px solid var(--accent);background:#e5e8e4}.lane[data-status=quoted]{border-color:var(--warm)}.lane[data-status=completed]{border-color:#57875d}.lane[data-status=canceled]{border-color:#8c9290}
    .lane-head{display:flex;align-items:center;justify-content:space-between;min-height:50px;padding:10px}.lane-head h2{margin:0;font-size:13px;text-transform:uppercase;letter-spacing:0}.lane-head span{min-width:24px;padding:3px 6px;border-radius:12px;text-align:center;background:var(--surface);font-size:12px;font-weight:800}
    .lane-list{display:grid;gap:8px;padding:0 8px 8px}.lead-card{display:grid;gap:7px;padding:11px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:0 1px 2px rgba(28,38,32,.06)}
    .lead-top{display:grid;grid-template-columns:auto 1fr;gap:4px 8px;align-items:baseline}.lead-top strong{overflow-wrap:anywhere}.lead-id{color:var(--muted);font-size:11px}.money{grid-column:1/-1;color:var(--accent);font-size:13px;font-weight:800}
    .phone{color:var(--ink);font-size:13px;font-weight:700;text-decoration:none}.details,.description,.note,.ai-summary{margin:0;font-size:12px;line-height:1.45;overflow-wrap:anywhere}.details{color:var(--muted)}.description{max-height:54px;overflow:hidden}.note{padding:7px;border-left:2px solid var(--warm);background:#fff6eb}.ai-summary{padding:7px;background:var(--accent-soft)}
    .signals{display:flex;gap:4px;flex-wrap:wrap}.signal{padding:3px 5px;border:1px solid var(--line);border-radius:4px;font-size:10px;font-weight:800}.signal.ai{color:var(--accent)}.signal.sync{color:#465a79}.signal.follow-up{flex-basis:100%}.signal.follow-up.today{color:#8a5700;background:#fff3d6}.signal.follow-up.overdue{color:var(--bad);background:#fde8e5}.signal.follow-up.planned{color:#465a79;background:#edf2f8}
    .lead-card label{display:grid;gap:4px;color:var(--muted);font-size:10px;font-weight:800;text-transform:uppercase}.lead-card select{width:100%;min-height:34px;font-size:12px}.lead-card textarea{width:100%;min-height:58px;resize:vertical;border:1px solid var(--line);border-radius:5px;padding:7px;font:12px/1.4 "Golos Text","Segoe UI",sans-serif;text-transform:none}.note-button,.reply-button,.drafts-button{min-height:32px;padding:5px 8px;font-size:11px}.reply-button{border-color:#465a79;background:#465a79}.drafts-button{border-color:var(--line);color:#465a79;background:#fff}.reply-draft,.draft-history{display:grid;gap:5px;color:var(--muted);font-size:11px}.reply-draft strong{color:#465a79}.reply-draft textarea{min-height:90px;background:#f4f7fb}.reply-draft small,.draft-history small{display:block;line-height:1.4}.draft-actions{display:grid;grid-template-columns:1fr 1fr;gap:4px}.draft-actions button{min-height:30px;padding:4px;font-size:10px}.draft-actions button:last-child{border-color:var(--bad);background:var(--bad)}.draft-history p{margin:0;padding:7px;border-left:2px solid #465a79;background:#f4f7fb;line-height:1.4}.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}.quick-actions button{min-height:29px;padding:4px 2px;border-color:var(--line);color:var(--accent);background:#fff;font-size:10px}.history{display:grid;gap:4px}.history p{margin:0;padding:6px;border-left:2px solid var(--accent);background:#f5f7f5;font-size:11px;line-height:1.4}.history time{display:block;margin-top:2px}time{color:var(--muted);font-size:10px}
    .empty,.board-empty{margin:0;padding:18px 10px;color:var(--muted);text-align:center;font-size:12px}.board-empty{grid-column:1/-1;border:1px solid var(--line);background:var(--surface)}
    :focus-visible{outline:3px solid #9fc52f;outline-offset:2px}.card-workspace{border-top:1px solid var(--line);padding-top:7px}.card-workspace summary{cursor:pointer;color:var(--accent);font-size:11px;font-weight:800}.card-workspace-body{display:grid;gap:7px;padding-top:8px}.lead-card .primary-actions{display:grid;grid-template-columns:1fr auto;gap:5px;align-items:end}.lead-card .primary-actions label{margin:0}.lead-card .primary-actions select{min-width:0}.summary div:last-child strong{color:var(--bad)}
    body{padding-left:232px;background:#f4f6f9}.app-sidebar{position:fixed;inset:0 auto 0 0;z-index:20;width:232px;padding:18px 14px;color:#f4f6f9;background:#343a40;border-right:1px solid #4b545c}.sidebar-brand{display:grid;grid-template-columns:38px 1fr;gap:10px;align-items:center;padding:0 4px 18px;border-bottom:1px solid #4b545c}.sidebar-mark{display:grid;width:38px;aspect-ratio:1;place-items:center;border-radius:6px;color:#fff;background:#315c78;font-weight:900}.sidebar-brand strong,.sidebar-brand small{display:block}.sidebar-brand strong{font-size:14px}.sidebar-brand small{margin-top:2px;color:#adb5bd;font-size:10px}.sidebar-nav{display:grid;gap:3px;margin-top:18px}.sidebar-nav a{padding:9px 10px;border:1px solid transparent;border-radius:5px;color:#c2c7d0;font-size:12px;font-weight:700;text-decoration:none}.sidebar-nav a:hover{color:#fff;background:#495057;border-color:#56606a}.sidebar-nav a.active{color:#fff;background:#315c78;border-color:#315c78}.topbar{box-shadow:0 1px 2px rgba(0,0,0,.08)}.brand-mark{color:#fff;background:#315c78}.summary div{border-color:#dee2e6;box-shadow:0 1px 3px rgba(0,0,0,.08)}.summary strong{color:#263746}.lane{border:1px solid #dee2e6;border-top:3px solid var(--accent);border-radius:5px;background:#e9ecef}.lead-card{box-shadow:0 1px 3px rgba(0,0,0,.08);transition:border-color .16s ease,box-shadow .16s ease}.lead-card:hover{border-color:#b8c4cc;box-shadow:0 2px 6px rgba(0,0,0,.1)}button{transition:box-shadow .16s ease,background .16s ease}button:hover:not(:disabled){box-shadow:0 3px 8px rgba(49,92,120,.18)}
    @media(max-width:900px){body{padding-left:0}.app-sidebar{position:static;width:auto;padding:10px 12px}.sidebar-brand{display:none}.sidebar-nav{display:flex;gap:5px;margin:0;overflow-x:auto}.sidebar-nav a{white-space:nowrap}.topbar-inner{align-items:flex-start;flex-direction:column}.controls{width:100%}.controls input[type=search]{width:100%}.summary{grid-template-columns:repeat(2,minmax(130px,1fr))}main{padding:12px}}
  </style>
</head>
<body>
  <aside class="app-sidebar" aria-label="Навигация CRM">
    <div class="sidebar-brand"><span class="sidebar-mark">FM</span><span><strong>Furniture OS</strong><small>Управление мастерской</small></span></div>
    <nav class="sidebar-nav"><a href="/admin.html">Обзор и заказы</a><a class="active" href="/crm.html">CRM-воронка</a><a href="/admin.html#calculator-title">Калькуляторы</a><a href="/admin.html#portfolio-title">Портфолио</a><a href="/admin.html#sites-title">Лендинги</a><a href="/admin.html#vps-title">Инфраструктура</a></nav>
  </aside>
  <header class="topbar"><div class="topbar-inner"><div class="brand"><div class="brand-mark">CRM</div><div><h1>Воронка мебельных заказов</h1><p>Лиды, сметы и производство в одном рабочем поле</p></div></div>
    <div class="controls"><input id="search" type="search" placeholder="Поиск клиента, телефона, заказа" /><input id="token" type="password" autocomplete="current-password" placeholder="Admin token" /><button id="save-token" class="secondary" type="button">Сохранить</button><button id="refresh" type="button">Обновить</button><a class="admin-link" href="/admin.html">Админка</a></div></div></header>
  <main><div id="message" class="status-line"></div><section id="crm-summary" class="summary" aria-label="Сводка"></section><nav class="filters" aria-label="Фильтры CRM"><button class="active" type="button" data-crm-mode="all">Все</button><button type="button" data-crm-mode="active">Активные</button><button type="button" data-crm-mode="attention">Требуют внимания</button><button type="button" data-crm-mode="follow_up">Контакт сегодня</button><button type="button" data-crm-mode="completed">Завершённые</button></nav><section id="crm-board" class="board" aria-label="CRM воронка"><div class="board-empty">Загрузка...</div></section></main>
  <script src="/crm.js" type="module"></script>
</body>
</html>
